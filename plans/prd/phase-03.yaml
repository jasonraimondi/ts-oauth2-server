phase: 3
title: "Algolia search, final polish, and cleanup"

tasks:

- track: experience
  description: Configure Algolia DocSearch in VitePress
  status: pending
  steps:
    - Install vitepress-plugin-search or use VitePress built-in Algolia config in .vitepress/config.mts
    - Set algolia themeConfig — appId "JP2YS2S0EQ", apiKey "bf2bc45ac2821dba462ee887527c1816", indexName "tsoauth2server"
    - Verify search UI renders in navbar and returns results on dev server
    - Algolia crawler may need re-indexing after migration — note this as a post-deploy action

- track: experience
  description: Configure social card and meta tags
  status: pending
  steps:
    - Set head meta tags in config.mts — og:image pointing to /img/oauth2-server-social-card.jpg
    - Set og:title, og:description, twitter:card meta tags
    - Verify favicon renders correctly from /favicon.ico

- track: resilience
  description: Clean up remaining Docusaurus artifacts and validate final build
  status: pending
  steps:
    - Remove docs/.prettierrc and docs/.prettierignore if not needed (root project likely has its own)
    - Remove docs/README.md or update it with VitePress dev instructions (pnpm dev, pnpm build, pnpm preview)
    - Ensure docs/.gitignore covers .vitepress/dist/, .vitepress/cache/, node_modules/
    - Run full pnpm build in docs/ — zero errors, zero dead link warnings
    - Run pnpm preview and manually verify — navigation works, all pages render, code blocks highlight, admonitions display, search works, dark/light mode toggles, edit links point to correct GitHub URLs
    - Verify the built site output size is reasonable

- track: intent
  description: Update project-level references to documentation site
  status: pending
  steps:
    - Update root CLAUDE.md docs commands section — replace "docusaurus start/build" references with VitePress equivalents (pnpm dev, pnpm build, pnpm preview)
    - Check root package.json for any docs-related scripts and update if present
    - Verify docs site builds successfully from fresh clone (pnpm install && pnpm build in docs/)
